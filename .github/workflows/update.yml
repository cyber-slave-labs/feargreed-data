name: update

on:
  schedule:
    - cron: '30 21 * * *'   # KST 06:30 (미국장 마감 후)
    - cron: '30 22 * * *'   # KST 07:30 (1차 실패 대비 재시도)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CNN Fear & Greed
        run: python3 scripts/fetch.py
      - name: Commit if changed
        run: |
          git config user.name "feargreed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "no changes" || (git commit -m "update $(date -u +%Y-%m-%d)" && git push)
